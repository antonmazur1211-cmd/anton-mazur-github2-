version: '3.8'

services:
  fastapi:
    build: .
    container_name: antonmazur_fastapi_dev
    ports:
      - "8000:8000"
      - "5678:5678"  # Для дебаггінгу
    volumes:
      - ./app:/app/app
      - ./run.py:/app/run.py
      - ./tests:/app/tests
    environment:
      - DATABASE_URL=postgresql://antonmazur:password123@postgres:5432/antonmazur_db
      - ENVIRONMENT=development
    depends_on:
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: antonmazur_postgres_dev
    environment:
      POSTGRES_USER: antonmazur
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: antonmazur_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: antonmazur_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@antonmazur.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data_dev:
